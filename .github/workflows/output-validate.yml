# Heavy lane: compiles every library entry under FreeCAD and validates the
# output geometry (completeness, overlap, fit). Path-filtered because the
# FreeCAD apt install is large.
name: output-validate
on:
  push:
    paths: ['library/**', 'libtools/**', 'pyproject.toml', '.github/workflows/output-validate.yml']
  pull_request:
    paths: ['library/**', 'libtools/**', 'pyproject.toml', '.github/workflows/output-validate.yml']
jobs:
  output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install FreeCAD
        run: |
          sudo add-apt-repository -y ppa:freecad-maintainers/freecad-stable
          sudo apt-get update -qq
          sudo apt-get install -y -qq freecad
          command -v freecadcmd
      # The PPA freecadcmd links against the system Python. A toolcache Python
      # from actions/setup-python leaks LD_LIBRARY_PATH into the job and breaks
      # freecadcmd's stdlib resolution, so this job stays on system Python.
      - run: python3 -m pip install --break-system-packages -e '.[dev]'
      - run: python3 -m libtools validate-output --root . --all
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-reports
          path: reports/
