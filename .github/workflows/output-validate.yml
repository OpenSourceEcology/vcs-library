# Heavy lane: compiles every library entry under FreeCAD and validates the
# output geometry (completeness, overlap, fit). Path-filtered because the
# FreeCAD apt install is large.
name: output-validate
on:
  push:
    paths: ['library/**', 'libtools/**', 'pyproject.toml', '.github/workflows/output-validate.yml']
  pull_request:
    paths: ['library/**', 'libtools/**', 'pyproject.toml', '.github/workflows/output-validate.yml']
jobs:
  output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install FreeCAD
        run: |
          sudo add-apt-repository -y ppa:freecad-maintainers/freecad-stable
          sudo apt-get update -qq
          sudo apt-get install -y -qq freecad
          command -v freecadcmd
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: python -m libtools validate-output --root . --all
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-reports
          path: reports/
